<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Gabble Demo</title>
    <style>
        @font-face {
            font-family: 'Commons Pro';
            src: url('TT_Commons_Pro_VF_Trial.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100%;
        }

        body {
            height: 100%;
            background-color: #eeeeee;
            font-family: 'Commons Pro', sans-serif;
        }

        .container {
            height: 100%;
        }

        .page {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page" style="flex-direction: column; gap: 2rem; padding-bottom: 6%">
            <img src="gabbleicon.png" alt="Gabble Icon"
                style="width: clamp(60px, 10vw, 200px); object-fit: contain; transform: translateY(30%);">

            <h1
                style="font-size: clamp(2.5rem, 3vw, 4rem); font-weight: 600; line-height: 1.1; max-width: 27ch; text-align: center; color: #111;">
                Gabble is a platform where users get paid to argue against humans or AI agents via real-time video and
                audio.

            </h1>

            <h1
                style="font-size: clamp(1rem, 1.3vw, 4rem); font-weight: 400; line-height: 1.0; max-width: 300ch; text-align: center; color: #999;">


                The result is a proprietary dataset that is used for frontier model improvement. 

            </h1>

        </div>
        <div class="page">
            <video id="slide2-video" src="flow1.mp4" muted playsinline preload="auto"
                style="max-height: 80vh; max-width: 90%; object-fit: contain;"></video>
        </div>


        <div id="slide-humandebate-page" class="page" style="position: relative; cursor: pointer;">
            <video id="slide-humandebate-video" src="humandebate.mov" playsinline preload="auto"
                style="max-height: 80vh; max-width: 90%; object-fit: contain;"></video>
            <div id="slide-humandebate-play"
                style="position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none;">
                <div
                    style="width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.85); display: flex; justify-content: center; align-items: center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#111">
                        <polygon points="6,3 20,12 6,21" />
                    </svg>
                </div>
            </div>
        </div>

        <div id="slide3-page" class="page" style="position: relative; cursor: pointer;">
            <video id="slide3-video" src="aidebate.mov" playsinline preload="auto"
                style="max-height: 80vh; max-width: 90%; object-fit: contain;"></video>
            <div id="slide3-play"
                style="position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none;">
                <div
                    style="width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.85); display: flex; justify-content: center; align-items: center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#111">
                        <polygon points="6,3 20,12 6,21" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="page" style="gap: 2vw; padding-top: 6%">
            <img src="result.png" alt="Result" style="max-height: 80vh; max-width: 100%; object-fit: contain;">
            <img src="leaderboard.png" alt="Leaderboard"
                style="max-height: 80vh; max-width: 100%; object-fit: contain;">

        </div>

        <div class="page" style="padding-top: 6%"><img src="earnings.png" alt="Earnings"
                style="max-height: 80vh; max-width: 100%; object-fit: contain;"></div>

        <div class="page" style="flex-direction: column; gap: 2vh;">
            <div style="display: flex; width: 80vw; gap: 6%; align-items: stretch;">
                <div
                    style="flex: 1; aspect-ratio: 1; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden;">
                    <img src="transcript.png" alt="Transcript" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div
                    style="flex: 1; aspect-ratio: 1; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden;">
                    <video src="soundwave.mp4" muted autoplay loop playsinline
                        style="padding: 20%; width: 100%; height: 100%; object-fit: contain; filter: blur(0px) contrast(3000%); mix-blend-mode: lighten"></video>
                </div>
                <div
                    style="flex: 1; aspect-ratio: 1; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden;">
                    <video src="video.mov" muted autoplay loop playsinline
                        style="padding: 30%; width: 100%; height: 100%; object-fit: contain;"></video>
                </div>
            </div>
        </div>
        <div class="page">
            <img src="gabbleicon.png" alt="Gabble Icon"
                style="width: clamp(60px, 10vw, 200px); object-fit: contain; transform: translateY(6%);">
            <span
                style="transform: translateY(-16%); font-size: clamp(2rem, 6vw, 6rem); font-weight: 600; color: #111; margin-left: 0.1em;">Gabble</span>
        </div>
    </div>
    <script>
        const video = document.getElementById('slide2-video');

        const video3 = document.getElementById('slide3-video');
        const videoHuman = document.getElementById('slide-humandebate-video');

        function updateVideoRadius() {
            if (video) video.style.borderRadius = (video.offsetHeight * 0.08) + 'px';
            if (video3) video3.style.borderRadius = (video3.offsetHeight * 0.08) + 'px';
            if (videoHuman) videoHuman.style.borderRadius = (videoHuman.offsetHeight * 0.08) + 'px';
        }
        window.addEventListener('load', updateVideoRadius);
        window.addEventListener('resize', updateVideoRadius);
        video.addEventListener('loadedmetadata', updateVideoRadius);
        video3.addEventListener('loadedmetadata', updateVideoRadius);
        videoHuman.addEventListener('loadedmetadata', updateVideoRadius);

        // slide2: muted autoplay observer
        new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    video.currentTime = 0;
                    video.play();
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        }, { threshold: 0.5 }).observe(video);

        // humandebate: unmuted — needs user gesture
        const humanPlayBtn = document.getElementById('slide-humandebate-play');
        const humanPage = document.getElementById('slide-humandebate-page');
        new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) {
                    videoHuman.pause();
                    videoHuman.currentTime = 0;
                    humanPlayBtn.style.display = 'flex';
                }
            });
        }, { threshold: 0.5 }).observe(videoHuman);

        humanPage.addEventListener('click', () => {
            if (videoHuman.paused) {
                humanPlayBtn.style.display = 'none';
                videoHuman.volume = 0.2;
                videoHuman.currentTime = 0;
                videoHuman.play();
            }
        });

        humanPlayBtn.addEventListener('click', () => {
            humanPlayBtn.style.display = 'none';
            videoHuman.currentTime = 0;
            videoHuman.play();
        });

        // slide3: unmuted — needs user gesture
        const playBtn = document.getElementById('slide3-play');
        const slide3Page = document.getElementById('slide3-page');
        new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) {
                    video3.pause();
                    video3.currentTime = 0;
                    playBtn.style.display = 'flex';
                }
            });
        }, { threshold: 0.5 }).observe(video3);

        slide3Page.addEventListener('click', () => {
            if (video3.paused) {
                playBtn.style.display = 'none';
                video3.volume = 1;
                video3.currentTime = 0;
                video3.play();
            }
        });

        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            video3.currentTime = 0;
            video3.play();
        });
    </script>
</body>

</html>
